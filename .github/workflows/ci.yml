name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ".[dev]"
      - name: Run static checks
        run: |
          ruff check app tests
          mypy --follow-imports=skip app/api_parsers.py app/models/appliance_id.py app/models/device.py app/models/device_group.py app/models/filter.py app/models/lookup_tables.py
      - name: Run deterministic tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          pytest -q
          tests/test_api_parsers.py
          tests/test_models.py
          tests/test_store.py
          tests/test_view_model.py
      - name: Compile Python sources
        run: python -m compileall -q app run.py
